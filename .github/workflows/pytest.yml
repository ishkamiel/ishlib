name: Pytest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck dash zsh bubblewrap
    - name: Allow unprivileged user namespaces for bubblewrap
      # Ubuntu 24.04's AppArmor profile blocks unprivileged userns by
      # default, which makes bwrap fail with "setting up uid map:
      # Permission denied" even with --unshare-user.  Disabling the
      # restriction is safe on the ephemeral CI VM.  The sysctl does
      # not exist on older kernels, so treat its absence as success.
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
    - name: Install Python dependencies
      run: |
        python -m pip install -U 'pip>=25.1'
        pip install --group test --group extras --group runtime
    - name: Run all pytests
      run: |
        pytest

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install -U 'pip>=25.1'
        pip install --group test --group extras --group runtime
    - name: Run Python tests
      run: |
        python -m pytest pytest/python/ -n 0 -v --tb=long

  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Python dependencies
      run: |
        python -m pip install -U 'pip>=25.1'
        pip install --group test --group extras --group runtime
    - name: Run Python tests
      run: |
        python -m pytest pytest/python/ -n 0 -v --tb=long
