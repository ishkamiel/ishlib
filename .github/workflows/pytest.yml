name: Pytest

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck dash zsh
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-xdist
        pip install -r requirements.txt
        pip install -r requirements-extra.txt
    - name: Run all pytests
      run: |
        pytest

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-xdist
        grep -v -E '^(griffe|mkdocs)' requirements.txt > requirements-test.txt
        python -m pip install -r requirements-test.txt
        # Install optional packages so the shtab-backed completion tests
        # and other optional-dep paths are exercised on Windows too
        # (matches the Linux jobs, and removes "optional dep missing"
        # as a cross-platform divergence in test coverage).
        python -m pip install -r requirements-extra.txt
    - name: Run Python tests
      run: |
        python -m pytest pytest/python/ -n 0 -v --tb=long

  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-xdist
        python -m pip install -r requirements.txt
        python -m pip install -r requirements-extra.txt
    - name: Run Python tests
      run: |
        python -m pytest pytest/python/ -n 0 -v --tb=long
