name: Pytest

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck dash zsh
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-xdist
        pip install -r requirements.txt
    - name: Run all pytests
      run: |
        pytest

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-xdist
        grep -v -E '^\s*(griffe|mkdocs)' requirements.txt > requirements-test.txt
        python -m pip install -r requirements-test.txt
    - name: Run Python tests
      shell: bash
      run: |
        python -m pytest pytest/python/ -v --tb=short -o addopts="" 2>&1 | tee test-output.txt
        rc=${PIPESTATUS[0]}
        if [ $rc -ne 0 ]; then
          echo ""
          echo "::group::Full test output"
          cat test-output.txt
          echo "::endgroup::"
          # Surface failures as annotations
          grep -A5 "FAILED\|ERROR\|short test summary" test-output.txt | while IFS= read -r line; do
            echo "::error::$line"
          done
        fi
        exit $rc
