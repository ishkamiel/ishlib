name: Wiki

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Build generated docs
      run: |
        mkdir -p docs
        ./ishlib.sh -h --markdown | head -n -1 > docs/ishlib_shell.md
        ./scripts/build_pydocs.py

    - name: Build wiki pages
      run: ./scripts/build_wiki.py --out wiki-staging

    - name: Clone wiki repo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo \
          || { git init wiki-repo && cd wiki-repo && git checkout -B master && git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"; }

    - name: Update wiki content
      run: |
        # Remove old pages (so deleted docs don't linger)
        find wiki-repo -maxdepth 1 -name '*.md' -delete

        # Copy new pages in
        cp wiki-staging/*.md wiki-repo/

    - name: Push to wiki
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd wiki-repo
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No wiki changes to push."
        else
          git commit -m "Update wiki from ${GITHUB_SHA::8}"
          git push origin HEAD:master
        fi
