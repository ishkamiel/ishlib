name: Wiki

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build generated docs
      run: |
        ./ishlib.sh -h --markdown | head -n -1 > docs/ishlib_shell.md
        ./scripts/build_pydocs.py

    - name: Build wiki pages
      run: ./scripts/build_wiki.py --out wiki

    - name: Push to wiki
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd wiki
        git init
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Update wiki from ${GITHUB_SHA::8}"
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git"
        git push --force origin master
