name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Python dependencies
      run: |
        python -m pip install -U 'pip>=25.1'
        pip install --group docs --group runtime
    - name: Verify generated docs can be built
      run: |
        mkdir -p docs
        ./ishlib.sh -h --markdown | head -n -1 > docs/ishlib_shell.md
        ./scripts/build_pydocs.py
    - name: Verify wiki pages can be built
      run: ./scripts/build_wiki.py --out /tmp/wiki
