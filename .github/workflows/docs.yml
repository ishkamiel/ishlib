name: Docs

on: [push, pull_request]

permissions:
  contents: read

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Rebuild generated docs
      run: |
        ./ishlib.sh -h --markdown | head -n -1 > docs/ishlib_shell.md
        ./scripts/build_pydocs.py
    - name: Check for uncommitted doc changes
      run: |
        if ! git diff --exit-code docs/ishlib_shell.md docs/pyishlib/; then
          echo "::error::Generated docs are out of date. Run 'make docs/ishlib_shell.md docs/pyishlib' and commit the result."
          exit 1
        fi
