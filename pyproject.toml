[dependency-groups]
runtime = [
  "tomli; python_version < '3.11'",
]

extras = [
  "shtab>=1.8.0",
  "cerberus",
  "jsonschema",
  "PyYAML",
  "tomli_w",
]

test = [
  "pytest",
  "pytest-xdist",
]

docs = [
  "griffe",
  "mkdocs",
  "mkdocs-material",
]

dev = [
  {include-group = "runtime"},
  {include-group = "test"},
  {include-group = "docs"},
  {include-group = "extras"},
  "mypy",
  "ruff",
]

[tool.ruff]
src = ["src"]

[tool.mypy]
mypy_path = "src"
explicit_package_bases = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["pytest.*"]
disable_error_code = [
  "call-overload",   # @patch decorator overloads
  "attr-defined",    # MagicMock attrs and pytest.mark.*
  "misc",            # decorator-untyped-call chains
  "no-untyped-def",  # conftest fixtures intentionally unannotated
]
check_untyped_defs = false
